<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Debug Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .test-result { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 5px; }
        input { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 4px; width: 200px; }
        .form-group { margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🔐 Login Debug Test</h1>
    
    <div class="form-group">
        <h3>Test Login</h3>
        <input type="email" id="email" placeholder="Email" value="admin@example.com">
        <input type="password" id="password" placeholder="Password" value="admin123">
        <button onclick="testLogin()">Test Login</button>
    </div>
    
    <div id="result"></div>
    
    <div class="form-group">
        <h3>Check Local Storage</h3>
        <button onclick="checkStorage()">Check Token Storage</button>
        <button onclick="clearStorage()">Clear Storage</button>
    </div>
    
    <div id="storageResult"></div>
    
    <div class="form-group">
        <h3>Test API Direct</h3>
        <button onclick="testApiDirect()">Test Backend API</button>
        <button onclick="testFrontendApi()">Test Frontend API</button>
    </div>
    
    <div id="apiResult"></div>

    <script>
        function showResult(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="test-result ${type}">${message}</div>`;
        }

        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                showResult('result', 'Testing login...', 'info');
                
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('smartuniit_token', data.token);
                    showResult('result', 
                        `✅ Login successful!<br>
                         User: ${data.user.name} (${data.user.email})<br>
                         Role: ${data.user.role}<br>
                         Token: ${data.token.substring(0, 50)}...`, 'success');
                } else {
                    showResult('result', `❌ Login failed: ${data.error}`, 'error');
                }
            } catch (error) {
                showResult('result', `❌ Login error: ${error.message}`, 'error');
            }
        }

        function checkStorage() {
            const token = localStorage.getItem('smartuniit_token');
            if (token) {
                showResult('storageResult', `✅ Token found: ${token.substring(0, 50)}...`, 'success');
            } else {
                showResult('storageResult', '❌ No token in localStorage', 'error');
            }
        }

        function clearStorage() {
            localStorage.removeItem('smartuniit_token');
            showResult('storageResult', '✅ Storage cleared', 'success');
        }

        async function testApiDirect() {
            try {
                const response = await fetch('http://localhost:3001/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'admin@example.com', password: 'admin123' })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showResult('apiResult', `✅ Backend API works: ${data.user.name}`, 'success');
                } else {
                    showResult('apiResult', `❌ Backend API failed: ${data.error}`, 'error');
                }
            } catch (error) {
                showResult('apiResult', `❌ Backend API error: ${error.message}`, 'error');
            }
        }

        async function testFrontendApi() {
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'admin@example.com', password: 'admin123' })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showResult('apiResult', `✅ Frontend API works: ${data.user.name}`, 'success');
                } else {
                    showResult('apiResult', `❌ Frontend API failed: ${data.error}`, 'error');
                }
            } catch (error) {
                showResult('apiResult', `❌ Frontend API error: ${error.message}`, 'error');
            }
        }

        // Auto-check storage on load
        checkStorage();
    </script>
</body>
</html>
